<style>
:root{
  --bg:#0d0f14; --bg2:#111420; --card:#181c28;
  --brd:rgba(201,169,110,.13); --brd2:rgba(255,255,255,.05);
  --gold:#c9a96e; --gold2:#ddc08a; --dim:#6e6650; --sv:#8a8d9a;
  --txt:#d4d7e2; --wh:#f0f1f5;
  --ok:#4dba8a; --wt:#d4924a;
  --ok-bg:rgba(77,186,138,.09); --wt-bg:rgba(212,146,74,.08);
  --ok-brd:rgba(77,186,138,.22); --wt-brd:rgba(212,146,74,.2);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:"Noto Sans KR",sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}

/* ── 헤더 ── */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(13,15,20,.96);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--brd);
  padding:0 20px;height:54px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.hd-logo{font-family:"Outfit",sans-serif;font-size:1.08rem;font-weight:700;color:var(--gold);letter-spacing:.04em;white-space:nowrap;}
.hd-logo span{color:var(--sv);font-weight:300;font-size:.76rem;margin-left:8px;}
.hd-date{font-family:"Outfit",sans-serif;font-size:.74rem;color:var(--sv);white-space:nowrap;}
.hd-date strong{color:var(--gold2);}

/* ── 범례 ── */
.legend{
  background:var(--bg2);border-bottom:1px solid var(--brd);
  padding:8px 20px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
}
.leg{display:flex;align-items:center;gap:6px;font-size:.73rem;color:var(--sv);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.ok{background:var(--ok);}
.dot.wt{background:var(--wt);}
.leg-note{margin-left:auto;font-size:.69rem;color:var(--dim);}

/* ── 필터 탭 ── */
.fbar{
  padding:9px 20px;display:flex;gap:5px;flex-wrap:wrap;
  border-bottom:1px solid var(--brd);background:var(--bg);
  position:sticky;top:54px;z-index:90;
}
.tab{
  font-family:"Outfit",sans-serif;font-size:.71rem;font-weight:500;
  padding:4px 11px;border-radius:14px;border:1px solid var(--brd);
  background:transparent;color:var(--sv);cursor:pointer;transition:all .15s;white-space:nowrap;
}
.tab:hover{border-color:var(--dim);color:var(--gold);}
.tab.on{background:var(--gold);color:#0d0f14;border-color:var(--gold);font-weight:600;}

/* ── 메인 ── */
main{padding:16px 20px;}
.cat-sec{margin-bottom:26px;}
.cat-sec.hidden{display:none;}
.cat-title{
  font-family:"Outfit",sans-serif;font-size:.63rem;font-weight:600;
  color:var(--dim);letter-spacing:.16em;text-transform:uppercase;
  padding-bottom:6px;border-bottom:1px solid var(--brd);margin-bottom:9px;
}

/* 모델 그리드 */
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:8px;}

/* 모델 카드 */
.mc{background:var(--card);border:1px solid var(--brd);border-radius:10px;overflow:hidden;transition:border-color .18s;}
.mc:hover{border-color:rgba(201,169,110,.26);}
.mc-head{padding:9px 13px 7px;border-bottom:1px solid var(--brd2);}
.mc-name{font-family:"Outfit",sans-serif;font-size:.84rem;font-weight:600;color:var(--wh);line-height:1.3;}
.mc-name.amg{color:#e06060;}
.mc-name.maybach{color:var(--gold);}

/* 조합 행 */
.crow{
  display:flex;align-items:flex-start;
  padding:8px 13px;gap:10px;
  border-bottom:1px solid var(--brd2);
  transition:background .12s;
}
.crow:last-child{border-bottom:none;}
.crow:hover{background:rgba(255,255,255,.023);}

/* 색상 정보 영역 */
.cinfo{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;}

/* 외장 행 */
.ext-row{display:flex;align-items:baseline;gap:5px;}
/* 내장 행 */
.int-row{display:flex;align-items:baseline;gap:5px;padding-left:2px;}

/* 구분선 */
.int-row::before{
  content:'└';font-size:.6rem;color:var(--dim);
  flex-shrink:0;line-height:1;margin-top:2px;
}

/* 칩 */
.chip{
  font-family:"Outfit",sans-serif;font-size:.62rem;font-weight:600;
  color:var(--dim);background:rgba(255,255,255,.05);
  border-radius:3px;padding:1px 5px;
  min-width:30px;text-align:center;letter-spacing:.03em;
  flex-shrink:0;line-height:1.5;
}
.chip.ic{background:rgba(201,169,110,.06);color:rgba(201,169,110,.45);}

/* 색상명 — 줄바꿈 허용, 말줄임 없음 */
.cn{font-size:.76rem;color:var(--sv);line-height:1.4;word-break:keep-all;}
.cn.inn{font-size:.71rem;color:rgba(201,169,110,.5);line-height:1.4;word-break:keep-all;}

/* 뱃지 */
.badge{
  font-family:"Outfit",sans-serif;font-size:.62rem;font-weight:700;
  padding:3px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;letter-spacing:.02em;
  margin-top:1px;
}
.badge.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-brd);}
.badge.wt{background:var(--wt-bg);color:var(--wt);border:1px solid var(--wt-brd);}

/* 빈 상태 */
#empty{display:none;text-align:center;padding:60px;color:var(--sv);font-size:.9rem;}

/* 푸터 */
.footer{text-align:center;padding:26px 20px 40px;border-top:1px solid var(--brd);}
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  color:var(--gold);border:1px solid var(--dim);padding:9px 22px;border-radius:30px;
  font-family:"Outfit",sans-serif;font-size:.82rem;text-decoration:none;
  letter-spacing:.04em;transition:background .18s;
}
.back-btn:hover{background:rgba(201,169,110,.07);}

@media(max-width:520px){
  header{height:50px;padding:0 14px;}
  .fbar{top:50px;padding:8px 14px;}
  main{padding:12px 14px;}
  .mgrid{grid-template-columns:1fr;}
  .leg-note{display:none;}
}
</style>
</head>

</header>

document.getElementById("upd").textContent = UPDATED;

const CAT_ORDER = ["A클래스","CLA","C클래스","CLE","E클래스","S클래스","AMG GT·SL","G클래스","GLA·GLB","GLC","GLE","전동화 EQ","Maybach"];
const modelToCat = {};
for(const [cat,models] of Object.entries(CATEGORIES)) models.forEach(m=>modelToCat[m]=cat);

// 필터 탭
const fb = document.getElementById("fbar");
["전체",...CAT_ORDER].forEach(t=>{
  const b=document.createElement("button");
  b.className="tab"+(t==="전체"?" on":"");
  b.textContent=t; b.onclick=()=>filter(t); fb.appendChild(b);
});

// 카테고리별 그룹
const catMap={};
CAT_ORDER.forEach(c=>catMap[c]=[]);
DATA.forEach(g=>{
  const cat=modelToCat[g.model]||"기타";
  if(!catMap[cat]) catMap[cat]=[];
  catMap[cat].push(g);
});

const mainEl=document.getElementById("main");

CAT_ORDER.forEach(cat=>{
  if(!catMap[cat]||catMap[cat].length===0) return;
  const sec=document.createElement("div");
  sec.className="cat-sec"; sec.dataset.cat=cat;
  sec.innerHTML=`<div class="cat-title">${cat}</div>`;

  const grid=document.createElement("div");
  grid.className="mgrid";

  catMap[cat].forEach(g=>{
    const isAMG=g.model.startsWith("AMG");
    const isMay=g.model.startsWith("Maybach");
    const nc=isAMG?"mc-name amg":isMay?"mc-name maybach":"mc-name";

    const rows=g.combos.map(c=>{
      const bc=c.s==="available"?"ok":"wt";
      const bt=c.s==="available"?"즉시출고 가능":"대기 필요";
      return `<div class="crow">
        <div class="cinfo">
          <div class="ext-row">
            <span class="chip">${c.ec}</span>
            <span class="cn">${c.en}</span>
          </div>
          <div class="int-row">
            <span class="chip ic">${c.ic}</span>
            <span class="cn inn">${c.inn}</span>
          </div>
        </div>
        <span class="badge ${bc}">${bt}</span>
      </div>`;
    }).join("");

    const card=document.createElement("div");
    card.className="mc"; card.dataset.cat=cat;
    card.innerHTML=`<div class="mc-head"><div class="${nc}">${g.model}</div></div>${rows}`;
    grid.appendChild(card);
  });

  sec.appendChild(grid);
  mainEl.appendChild(sec);
});

// 필터
function filter(cat){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.textContent===cat));
  document.querySelectorAll(".cat-sec").forEach(s=>s.classList.toggle("hidden",cat!=="전체"&&s.dataset.cat!==cat));
  const vis=document.querySelectorAll(".cat-sec:not(.hidden)");
  document.getElementById("empty").style.display=vis.length===0?"block":"none";
  window.scrollTo({top:54,behavior:"smooth"});
}
