<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>BenzDream 재고 트래킹</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#08080d;color:#e8e8ed;font-family:'Noto Sans KR',sans-serif;font-size:13px;line-height:1.5;padding:14px 10px 60px;max-width:960px;margin:0 auto}

.hero{text-align:center;margin-bottom:16px;position:relative;padding:10px 0 16px}
.hero::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60px;height:1px;background:linear-gradient(90deg,transparent,#c9a96e,transparent)}
.hero-tag{font-family:'Outfit',sans-serif;font-size:9px;letter-spacing:4px;color:#c9a96e;text-transform:uppercase;margin-bottom:4px}
.hero-title{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.02em}
.hero-sub{font-size:10px;color:#666;margin-top:2px}
.updated{display:inline-block;margin-top:8px;padding:4px 12px;background:#141824;border:1px solid #2a3040;border-radius:20px;font-family:'Outfit',sans-serif;font-size:10px;color:#c9a96e;font-weight:600}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.kpi{background:linear-gradient(135deg,#141824,#0f1119);border:1px solid #1f2430;border-radius:12px;padding:10px 8px;text-align:center}
.kpi-num{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;line-height:1;color:#fff}
.kpi-lbl{font-size:9px;color:#777;letter-spacing:.5px;margin-top:3px}
.kpi-delta{font-size:10px;margin-top:3px;font-family:'Outfit',sans-serif;font-weight:700}
.kpi-delta.up{color:#10b981}
.kpi-delta.down{color:#ef4444}
.kpi-delta.flat{color:#555}
.kpi-1 .kpi-num{color:#c9a96e} .kpi-2 .kpi-num{color:#10b981}
.kpi-3 .kpi-num{color:#f59e0b} .kpi-4 .kpi-num{color:#3b82f6}

/* Daily summary strip */
.daily-strip{background:linear-gradient(135deg,#1a1a2a,#141824);border:1px solid #c9a96e33;border-radius:12px;padding:12px 14px;margin-bottom:14px}
.daily-strip .dt{font-size:9px;color:#c9a96e;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.daily-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.daily-item{text-align:center}
.daily-item .n{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;line-height:1}
.daily-item .l{font-size:9px;color:#888;margin-top:3px}
.daily-item.plus .n{color:#10b981}
.daily-item.minus .n{color:#ef4444}
.daily-item.contract .n{color:#f59e0b}
.daily-item.deliver .n{color:#c9a96e}

.tabs{display:flex;gap:3px;background:#141824;border-radius:10px;padding:3px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:68px;padding:8px 5px;border:none;border-radius:7px;cursor:pointer;font-size:10.5px;font-weight:600;background:transparent;color:#888;font-family:inherit;white-space:nowrap;transition:all .2s}
.tab.active{background:linear-gradient(135deg,#c9a96e,#ddc08a);color:#0a0a0f}

.section{background:#141824;border:1px solid #1f2430;border-radius:14px;padding:14px 12px;margin-bottom:12px}
.sec-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
.sec-name{font-size:13px;font-weight:700;color:#fff}
.sec-sub{font-size:10px;color:#666}

.row{display:grid;gap:8px;padding:9px 10px;background:#0f1119;border-radius:8px;margin-bottom:4px;align-items:center;border-left:3px solid transparent}
.row.hot{border-left-color:#ef4444}
.row.warm{border-left-color:#f59e0b}
.row.cold{border-left-color:#3b82f6}
.row-rank{font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;color:#666;min-width:22px;text-align:center}
.row-name{font-size:12px;font-weight:600;color:#f0f0f5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-cat{font-size:9px;color:#888;margin-top:1px}
.row-num{font-family:'Outfit',sans-serif;font-weight:700;text-align:right}
.row-num .unit{font-size:9px;color:#666;margin-left:1px;font-weight:500}

.top20 .row{grid-template-columns:22px 1fr 54px 52px}
.top20 .n-tot{color:#c9a96e;font-size:14px}
.top20 .n-rate{font-size:11px;color:#f59e0b}

.hot-list .row{grid-template-columns:22px 1fr 48px 48px}
.hot-list .n-rate{color:#ef4444;font-size:13px}
.hot-list .n-remain{color:#10b981;font-size:11px}

.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cat-card{background:#0f1119;border-radius:10px;padding:10px 12px;border-left:3px solid #c9a96e}
.cat-card .cn{font-size:12px;font-weight:700;color:#fff;margin-bottom:4px}
.cat-card .cs{display:flex;justify-content:space-between;font-size:10px;color:#888}
.cat-card .cs b{color:#c9a96e;font-family:'Outfit',sans-serif}
.cat-card .cr{margin-top:4px;font-size:9px;color:#f59e0b}

.cat-block{margin-bottom:12px}
.cat-header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#0f1119;border-radius:8px;cursor:pointer;margin-bottom:4px}
.cat-header.open{border-left:3px solid #c9a96e}
.cat-header .cnm{font-size:13px;font-weight:700;color:#fff}
.cat-header .cct{font-size:10px;color:#c9a96e;font-family:'Outfit',sans-serif}
.cat-models{display:none;padding-left:4px}
.cat-models.open{display:block}
.cat-models .row{grid-template-columns:1fr 44px 44px 44px;font-size:11px}
.cat-models .n-av{color:#10b981}
.cat-models .n-as{color:#f59e0b}
.cat-models .n-cr{color:#ef4444}

.search{margin-bottom:10px}
.search input{width:100%;background:#0f1119;border:1px solid #2a3040;border-radius:8px;padding:10px 14px;color:#fff;font-size:12px;font-family:inherit;outline:none}
.search input:focus{border-color:#c9a96e}

.alert{background:linear-gradient(135deg,#1a0f0f,#14080a);border:1px solid #ef444444;border-radius:10px;padding:12px;margin-bottom:10px}
.alert-title{font-size:11px;font-weight:700;color:#ef4444;margin-bottom:8px}
.alert-row{display:grid;grid-template-columns:1fr 40px 45px;gap:8px;padding:6px 0;border-bottom:1px solid #2a1010;font-size:11px;align-items:center}
.alert-row:last-child{border:none}
.alert-rate{text-align:right;color:#ef4444;font-family:'Outfit',sans-serif;font-weight:800}
.alert-tot{text-align:right;color:#888;font-family:'Outfit',sans-serif}

.change-group{margin-bottom:14px}
.change-title{font-size:11px;font-weight:700;color:#c9a96e;margin-bottom:6px;display:flex;align-items:center;gap:6px;padding:0 2px}
.change-title.minus{color:#ef4444}
.change-title.plus{color:#10b981}
.change-title.contract{color:#f59e0b}
.change-row{display:grid;grid-template-columns:1fr 40px;gap:8px;padding:7px 10px;background:#0f1119;border-radius:6px;margin-bottom:3px;font-size:11px;align-items:center}
.change-row .cn{color:#e0e0e6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.change-row .cv{text-align:right;font-family:'Outfit',sans-serif;font-weight:700}

.sm-card{display:grid;grid-template-columns:24px 1fr 30px;gap:8px;padding:7px 10px;background:#0f1119;border-radius:6px;margin-bottom:3px;font-size:11px;align-items:center}
.sm-card .r{font-family:'Outfit',sans-serif;font-weight:800;color:#666;text-align:center}
.sm-card .n{color:#f0f0f5;font-weight:600}
.sm-card .b{font-size:9px;color:#888;margin-left:4px}
.sm-card .c{text-align:right;color:#c9a96e;font-family:'Outfit',sans-serif;font-weight:700}

.footer{text-align:center;font-size:9px;color:#444;margin-top:20px;line-height:1.8}
.footer b{color:#c9a96e}

@media (max-width:420px){
  .kpi-num{font-size:17px}
  .kpi-lbl{font-size:8px}
  .cat-grid{grid-template-columns:1fr}
  .daily-grid{grid-template-columns:repeat(2,1fr);gap:10px}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">Motor One · Inventory Tracking</div>
  <h1 class="hero-title">재고 트래킹 대시보드</h1>
  <div class="hero-sub">직판제 전국재고 실시간 모니터링</div>
  <div class="updated" id="updated">최종 업데이트 2026-04-10</div>
</div>

<!-- KPI with delta -->
<div class="kpis">
  <div class="kpi kpi-1"><div class="kpi-num" id="k1">0</div><div class="kpi-lbl">전체 재고</div><div class="kpi-delta flat" id="d1">-</div></div>
  <div class="kpi kpi-2"><div class="kpi-num" id="k2">0</div><div class="kpi-lbl">판매 가능</div><div class="kpi-delta flat" id="d2">-</div></div>
  <div class="kpi kpi-3"><div class="kpi-num" id="k3">0</div><div class="kpi-lbl">계약 중</div><div class="kpi-delta flat" id="d3">-</div></div>
  <div class="kpi kpi-4"><div class="kpi-num" id="k4">0%</div><div class="kpi-lbl">계약률</div><div class="kpi-delta flat" id="d4">-</div></div>
</div>

<!-- Daily activity strip -->
<div class="daily-strip" id="dailyStrip"></div>

<div class="tabs">
  <button class="tab active" onclick="showTab('top20',this)">🔥 Top 20</button>
  <button class="tab" onclick="showTab('hot',this)">⚡ 계약률</button>
  <button class="tab" onclick="showTab('changes',this)">🔄 변동</button>
  <button class="tab" onclick="showTab('cat',this)">📊 카테고리</button>
  <button class="tab" onclick="showTab('all',this)">📋 전체</button>
  <button class="tab" onclick="showTab('trend',this)">📈 추이</button>
</div>

<div id="t-top20" class="tab-content">
  <div class="alert" id="alertBox"></div>
  <div class="section">
    <div class="sec-title"><div class="sec-name">🔥 재고 Top 20</div><div class="sec-sub">많은순</div></div>
    <div class="top20" id="top20List"></div>
  </div>
</div>

<div id="t-hot" class="tab-content" style="display:none">
  <div class="section">
    <div class="sec-title"><div class="sec-name">⚡ 계약률 Top 20</div><div class="sec-sub">세일즈 속도 · 10대↑</div></div>
    <div class="hot-list" id="hotList"></div>
  </div>
</div>

<div id="t-changes" class="tab-content" style="display:none">
  <div class="section">
    <div class="sec-title"><div class="sec-name">🔄 4/9 → 4/10 변동</div><div class="sec-sub">VIN 기준</div></div>
    <div id="changesBox"></div>
  </div>
</div>

<div id="t-cat" class="tab-content" style="display:none">
  <div class="section">
    <div class="sec-title"><div class="sec-name">📊 카테고리별 현황</div></div>
    <div class="cat-grid" id="catGrid"></div>
  </div>
  <div class="section">
    <div class="sec-title"><div class="sec-name">🎨 카테고리 분포</div></div>
    <canvas id="catChart" height="200"></canvas>
  </div>
</div>

<div id="t-all" class="tab-content" style="display:none">
  <div class="search"><input type="text" id="searchInput" placeholder="모델명 검색..."></div>
  <div id="allModels"></div>
</div>

<div id="t-trend" class="tab-content" style="display:none">
  <div class="section">
    <div class="sec-title"><div class="sec-name">📈 일별 추이</div><div class="sec-sub" id="trendDays"></div></div>
    <canvas id="trendChart" height="220"></canvas>
  </div>
</div>

<div class="footer">
  <b>BenzDream Analytics</b> · 직판제 전국재고 통합 트래킹<br>
  매일 업로드 시 VIN 레벨 변동 자동 계산
</div>

const STORAGE_KEY = 'benzdream_inv_history_v2';
function loadHist(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch(e){return[]}}

// Merge preload with existing

  if(!history.find(h=>h.date===p.date)) history.push(p);

function fmtD(v,suffix=''){
  if(v===null||v===undefined) return '-';
  const n = parseFloat(v);
  if(n===0) return '→ 0';
  if(n>0) return '▲ +'+v+suffix;
  return '▼ '+v+suffix;
}
function dCls(v){
  if(v===null||v===undefined) return 'flat';
  const n = parseFloat(v);
  if(n===0) return 'flat';
  return n>0?'up':'down';
}

  const da = today.available - yesterday.available;

  const dr = (today.rate - yesterday.rate).toFixed(1);
  document.getElementById('d1').textContent = fmtD(dt);
  document.getElementById('d1').className = 'kpi-delta '+dCls(dt);
  document.getElementById('d2').textContent = fmtD(da);
  document.getElementById('d2').className = 'kpi-delta '+dCls(da);
  document.getElementById('d3').textContent = fmtD(dc);
  document.getElementById('d3').className = 'kpi-delta '+dCls(dc);

// All models
function renderAll(filter=''){
  let html = '';
  const byCat = {};
  Object.entries(DATA.models).forEach(([n,d])=>{
    if(filter && !n.toLowerCase().includes(filter.toLowerCase())) return;
    if(!byCat[d.cat]) byCat[d.cat]=[];
    byCat[d.cat].push({name:n,...d});
  });
  Object.keys(cats).forEach(cat=>{
    if(!byCat[cat]||byCat[cat].length===0) return;
    const models = byCat[cat].sort((a,b)=>b.tot-a.tot);
    const ct = models.reduce((s,m)=>s+m.tot,0);
    const isOpen = filter ? 'open' : '';
    html += `<div class="cat-block">
      <div class="cat-header ${isOpen}" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <div class="cnm">${cat}</div>
        <div class="cct">${models.length}모델 · ${ct}대</div>
      </div>
      <div class="cat-models ${isOpen}">`;
    models.forEach(m=>{
      html += `<div class="row">
        <div class="row-name">${m.name}</div>
        <div class="row-num">${m.tot}</div>
        <div class="row-num n-av">${m.av}</div>
        <div class="row-num n-cr">${m.cr}%</div>
      </div>`;
    });
    html += '</div></div>';
  });
  if(!html) html='<div style="text-align:center;padding:40px;color:#555">검색 결과 없음</div>';
  document.getElementById('allModels').innerHTML = html;
}

function showTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(el=>el.style.display='none');
  document.getElementById('t-'+id).style.display='block';
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
  if(id==='cat') renderCatChart();
  if(id==='trend') renderTrend();
}

let catChartInst=null;
function renderCatChart(){
  if(catChartInst) return;
  const ctx = document.getElementById('catChart').getContext('2d');
  const labels = Object.keys(cats);
  catChartInst = new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[
      {label:'판매가능',data:labels.map(l=>cats[l].available),backgroundColor:'#10b981',borderRadius:4},
      {label:'계약',data:labels.map(l=>cats[l].assigned),backgroundColor:'#f59e0b',borderRadius:4},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#888',font:{size:10}}}},
      scales:{x:{stacked:true,ticks:{color:'#888',font:{size:9}},grid:{display:false}},
              y:{stacked:true,ticks:{color:'#888',font:{size:9}},grid:{color:'#1f2430'}}}
    }
  });
}

function renderTrend(){

              y1:{position:'right',ticks:{color:'#f59e0b',font:{size:9}},grid:{display:false}}}

}
