*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F8FA; --card:#FFFFFF; --border:#E5E9F0; --border-soft:#EFF2F7;
  --text:#0F172A; --text-sub:#64748B; --text-mute:#94A3B8;

  --silver:#8B95A1; --gold:#C9A96E;

body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
.wrap{max-width:860px;margin:0 auto;padding:20px 16px 60px}

.hero{text-align:center;margin-bottom:24px;padding:0}
.hero-banner{width:100%;border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.hero-banner img{width:100%;display:block;object-fit:cover}
.hero-brand{font-family:'Inter',sans-serif;font-size:10px;letter-spacing:4px;color:var(--accent);font-weight:700;text-transform:uppercase;margin-bottom:6px}
.hero-title{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1.2}
.hero-sub{font-size:12px;color:var(--text-sub);margin-top:4px;font-weight:500}
.updated{display:inline-block;margin-top:10px;padding:6px 14px;background:var(--accent-light);color:var(--accent);border-radius:20px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600}

.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 12px;text-align:center;transition:all .2s}
.stat:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,102,178,.08)}
.stat-num{font-family:'Inter',sans-serif;font-size:28px;font-weight:800;color:var(--accent);line-height:1}
.stat-lbl{font-size:11px;color:var(--text-sub);margin-top:5px;font-weight:500}

.search-box{position:relative;margin-bottom:14px}
.search-box input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px 46px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:all .2s}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,102,178,.1)}
.search-box input::placeholder{color:var(--text-mute)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-mute)}

.cats{display:flex;gap:6px;overflow-x:auto;margin:0 -16px 16px;padding:0 16px 8px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;background:var(--card);border:1.5px solid var(--border);border-radius:24px;padding:9px 16px;color:var(--text-sub);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:inherit}
.cat-chip:hover{border-color:var(--silver)}
.cat-chip .cnt{display:inline-block;background:var(--border-soft);color:var(--text-sub);padding:2px 8px;border-radius:12px;margin-left:6px;font-family:'Inter',sans-serif;font-size:10px;font-weight:700}
.cat-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-chip.active .cnt{background:rgba(255,255,255,.2);color:#fff}

.cat-section{margin-bottom:28px}
.cat-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;padding:0 4px;border-bottom:1px solid var(--border-soft);padding-bottom:10px}
.cat-name{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.01em}
.cat-cnt{font-family:'Inter',sans-serif;font-size:12px;color:var(--accent);font-weight:700}

.model-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .2s;margin-bottom:8px}
.model-card.open{border-color:var(--accent);box-shadow:0 4px 20px rgba(0,102,178,.08)}
.model-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:12px}
.model-head:hover{background:var(--border-soft)}
.model-card.open .model-head{background:var(--accent-light)}
.model-name{font-weight:700;color:var(--text);font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.model-meta{display:flex;align-items:center;gap:10px;flex-shrink:0}
.model-badge{font-size:11px;font-weight:700;color:#0A7D3E;background:#E6F7ED;padding:3px 10px;border-radius:20px;white-space:nowrap;letter-spacing:-.01em}
.arrow{width:8px;height:8px;border-right:2px solid var(--text-mute);border-bottom:2px solid var(--text-mute);transform:rotate(45deg);transition:transform .25s}
.model-card.open .arrow{transform:rotate(-135deg);border-color:var(--accent)}

.combos{max-height:0;overflow:hidden;transition:max-height .35s ease}
.model-card.open .combos{max-height:4000px}
.combos-inner{padding:10px 14px 14px}
.ext-group{margin-bottom:12px;padding:10px 12px;background:var(--border-soft);border-radius:10px}
.ext-group:last-child{margin-bottom:0}
.ext-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ext-swatch{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);object-fit:cover;flex-shrink:0}
.ext-label{font-weight:700;font-size:13px;color:var(--text)}
.int-tags{display:flex;flex-wrap:wrap;gap:6px;padding-left:32px}
.int-tag{font-size:11px;color:var(--text-sub);background:var(--card);padding:4px 10px 4px 4px;border-radius:20px;font-weight:500;line-height:1.3;border:1px solid var(--border);display:inline-flex;align-items:center;gap:5px}
.int-swatch{width:18px;height:18px;border-radius:50%;border:1px solid var(--border);flex-shrink:0}

.cta-section{background:linear-gradient(135deg,#F8FAFD,#EDF2F7);border:1px solid var(--border);border-radius:16px;padding:24px 20px;margin-top:32px;text-align:center}
.cta-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px}
.cta-sub{font-size:12px;color:var(--text-sub);margin-bottom:18px;line-height:1.7}
.cta-btns{display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto}
.cta-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:12px;text-decoration:none;font-size:14px;font-weight:700;transition:all .2s}
.cta-kakao{background:#FEE500;color:#000}
.cta-form{background:var(--accent);color:#fff}
.cta-yt{background:var(--text);color:#fff}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12)}

.empty{text-align:center;padding:60px 20px;color:var(--text-mute);font-size:13px}
.footer{text-align:center;font-size:11px;color:var(--text-mute);margin-top:28px;line-height:1.8}
.footer .co{color:var(--text-sub);margin-top:4px;font-weight:500}

.totop{position:fixed;bottom:24px;right:20px;width:46px;height:46px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:20px;cursor:pointer;box-shadow:0 6px 20px rgba(0,102,178,.35);opacity:0;pointer-events:none;transition:all .3s;z-index:100;font-weight:700}
.totop.show{opacity:1;pointer-events:auto}
.totop:hover{transform:translateY(-3px)}

@media (min-width:640px){.hero-title{font-size:32px}.stat-num{font-size:34px}.summary{grid-template-columns:repeat(3,1fr);gap:14px}}

</style>
</head>

let currentCat = 'ALL', searchTerm = '';

function getTotal(){return DATA.reduce((s,m)=>s+m.combos.reduce((x,c)=>x+c.total,0),0)}
function catTotal(cat){return (CATEGORIES[cat]||[]).reduce((s,mn)=>{const m=DATA.find(x=>x.model===mn);return s+(m?m.combos.reduce((x,c)=>x+c.total,0):0)},0)}

document.getElementById('updatedBadge').textContent = '최종 업데이트 ' + UPDATED;

function renderCats(){
  const t = getTotal();
  let h = `<button class="cat-chip ${currentCat==='ALL'?'active':''}" data-cat="ALL">전체</button>`;
  Object.keys(CATEGORIES).forEach(c=>{
    const n = catTotal(c);
    if(n>0) h += `<button class="cat-chip ${currentCat===c?'active':''}" data-cat="${c}">${c}</button>`;
  });
  document.getElementById('cats').innerHTML = h;
  document.querySelectorAll('.cat-chip').forEach(b=>{
    b.onclick = ()=>{currentCat=b.dataset.cat;renderCats();render();window.scrollTo({top:document.getElementById('listing').offsetTop-80,behavior:'smooth'})};
  });
}

function matches(m){
  if(!searchTerm) return true;
  const s = searchTerm.toLowerCase();
  if(m.model.toLowerCase().includes(s)) return true;
  return m.combos.some(c=>(c.en+' '+c.inn).toLowerCase().includes(s));
}

  "투톤 화이트/블랙":"linear-gradient(135deg, #F2F2F0 50%, #1C1C1C 50%)",
  "NEOTEX/ARTICO 네바 그레이/발바오 브라운":"#888888",
  "NEOTEX/ARTICO 네바 그레이/비스케이 블루":"#888888",
  "NEOTEX/ARTICO 블랙/발바오 브라운":"#888888",
  "NEOTEX/ARTICO 블랙/스페이스 그레이":"#888888",
  "아티코 가죽 세이지 그레이 / 블랙":"#888888"
,
  "아티코 가죽/ 마이크로컷 마이크로파이버 블랙":"#1C1C1C",
  "아티코 가죽/마이크로컷 마이크로파이버  블랙":"#1C1C1C",
  "아티코 인조 가죽/다이나미카 AMG 블랙":"#1C1C1C",
  "아티코 인조 가죽/다이나미카 블랙":"#1C1C1C"
,
  "AMG 블랙":"#1C1C1C"
};

function render(){
  let h = '';
  const cats = currentCat==='ALL' ? Object.keys(CATEGORIES) : [currentCat];
  cats.forEach(cat=>{
    if(!CATEGORIES[cat]) return;
    const models = CATEGORIES[cat].map(mn=>DATA.find(d=>d.model===mn)).filter(m=>m && matches(m)).sort((a,b)=>a.model.localeCompare(b.model));
    if(!models.length) return;
    const total = models.reduce((s,m)=>s+m.combos.reduce((x,c)=>x+c.total,0),0);
    h += `<div class="cat-section"><div class="cat-header"><div class="cat-name">${cat}</div><div class="cat-cnt">${models.length}개 모델</div></div>`;
    models.forEach(m=>{
      const mt = m.combos.reduce((s,c)=>s+c.total,0);
      h += `<div class="model-card"><div class="model-head"><div class="model-name">${m.model}</div><div class="model-meta"><div class="model-badge">즉시출고가능</div><div class="arrow"></div></div></div><div class="combos"><div class="combos-inner">`;
      const extMap = {};
      m.combos.forEach(c=>{
        if(!extMap[c.en]) extMap[c.en]=[];
        let inn = c.inn
          .replace(/^(?:MANUFAKTUR|MAYBACH|AMG|마이바흐)\s+(?:익스클루시브\s+)?(?:나파\s+)?가죽[,.\s]\s*/,'')
          .replace(/^익스클루시브\s+나파\s+가죽[,.\s]\s*/,'')
          .replace(/^나파\s+가죽[,.\s]\s*/,'')
          .replace(/^아티코\s+(?:투톤\s+)?(?:인조\s+)?가죽\s*[/,]\s*(?:다이나미카\s*(?:AMG\s*)?|마이크로컷\s+마이크로파이버\s*)/,'')
          .replace(/^아티코\s+(?:투톤\s+)?(?:인조\s+)?가죽[,.\s]\s*/,'')
          .replace(/^NEOTEX\/ARTICO\s+/,'')
          .replace(/^가죽[,.\s]\s*/,'')
          .replace(/,\s*AMG\s+가죽$/,'')
          .trim();
        if(inn && !extMap[c.en].includes(inn)) extMap[c.en].push(inn);
      });
      /* 내장색 정렬: 블랙→그레이→브라운→베이지→화이트→레드→기타 */
      const intOrder = s => {
        const l = s.replace(/\s/g,'');
        if(l==='블랙'||l==='블랙/블랙') return 0;
        if(l.startsWith('블랙/')) return 1;
        if(/그레이|그레이\//.test(l)) return 2;
        if(/브라운|통카/.test(l)) return 3;
        if(/베이지|내추럴/.test(l)) return 4;
        if(/화이트/.test(l)) return 5;
        if(/레드|파워/.test(l)) return 6;
        return 7;
      };
      Object.keys(extMap).forEach(k => extMap[k].sort((a,b) => intOrder(a)-intOrder(b)));
      /* 외장색 정렬: 화이트→실버→그레이→블랙→블루→브라운→그린→레드→기타 */
      const extOrder = s => {
        if(/화이트/.test(s)) return 0;
        if(/실버/.test(s)) return 1;
        if(/그레이|그레이/.test(s)) return 2;
        if(/블랙/.test(s)) return 3;
        if(/블루/.test(s)) return 4;
        if(/브라운/.test(s)) return 5;
        if(/그린/.test(s)) return 6;
        if(/레드/.test(s)) return 7;
        return 8;
      };
      const extKeys = Object.keys(extMap).sort((a,b) => extOrder(a)-extOrder(b));
      extKeys.forEach(ext=>{
        const ec = EXT_CLR[ext] || '#ccc';
        const swatch = `<span class="ext-swatch" style="background:${ec}"></span>`;
        h += `<div class="ext-group"><div class="ext-head">${swatch}<div class="ext-label">${ext}</div></div><div class="int-tags">`;
        extMap[ext].forEach(inn=>{
          const clr = INT_CLR[inn];
          const bg = clr ? (clr.startsWith('linear') ? clr : clr) : '#ccc';
          const intSw = `<span class="int-swatch" style="background:${bg}"></span>`;
          h += `<span class="int-tag">${intSw}${inn}</span>`;
        });
        h += `</div></div>`;
      });
      h += `</div></div></div>`;
    });
    h += `</div>`;
  });
  if(!h) h = '<div class="empty">검색 결과가 없습니다<br>다른 키워드로 시도해보세요</div>';
  document.getElementById('listing').innerHTML = h;
  document.querySelectorAll('.model-head').forEach(he=>{he.onclick=()=>he.closest('.model-card').classList.toggle('open')});
}

document.getElementById('searchInput').addEventListener('input',e=>{searchTerm=e.target.value.trim();render()});

const totop = document.getElementById('totop');
window.addEventListener('scroll',()=>totop.classList.toggle('show',window.scrollY>400));
totop.onclick = ()=>window.scrollTo({top:0,behavior:'smooth'});

renderCats();
render();
</script>
</body></html>
