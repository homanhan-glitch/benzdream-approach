<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BenzDream 실시간 재고</title>
<meta name="description" content="BenzDream 실시간 판매 가능 재고">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#F7F8FA;color:#0F172A;min-height:100vh;padding-bottom:120px}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
header{text-align:center;padding:28px 0 16px}
header h1{font-size:22px;font-weight:800;letter-spacing:-0.02em}
header .sub{margin-top:8px;font-size:13px;color:#64748B}
.updated{display:inline-block;margin-top:10px;padding:5px 14px;background:#fff;border:1px solid #E2E8F0;border-radius:999px;font-family:'Outfit',sans-serif;font-size:11px;color:#0066B2;font-weight:600}
.search{margin:20px 0 16px}
.search input{width:100%;padding:14px 18px;background:#fff;border:1px solid #E2E8F0;border-radius:14px;font-size:14px;font-family:inherit;color:#0F172A;outline:none;transition:all .2s}
.search input:focus{border-color:#0066B2;box-shadow:0 0 0 3px rgba(0,102,178,.1)}
.cat-nav{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;margin-bottom:20px;scrollbar-width:none}
.cat-nav::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:9px 16px;background:#fff;border:1px solid #E2E8F0;border-radius:999px;font-size:12px;font-weight:600;color:#475569;cursor:pointer;white-space:nowrap;transition:all .2s}
.chip:hover{border-color:#0066B2;color:#0066B2}
.chip.active{background:#0066B2;border-color:#0066B2;color:#fff}
.cat-section{margin-bottom:28px}
.cat-header{display:flex;justify-content:space-between;align-items:baseline;padding:12px 4px;border-bottom:2px solid #0066B2;margin-bottom:14px}
.cat-name{font-size:16px;font-weight:800;color:#0F172A}
.cat-cnt{font-size:11px;color:#8B95A1;font-family:'Outfit',sans-serif;font-weight:600}
.model-card{background:#fff;border:1px solid #E2E8F0;border-radius:14px;margin-bottom:10px;overflow:hidden;transition:all .2s}
.model-card:hover{border-color:#B8C5D6;box-shadow:0 4px 12px rgba(15,23,42,.06)}
.model-head{padding:16px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.model-name{font-size:14px;font-weight:700;color:#0F172A;letter-spacing:-0.01em}
.arrow{width:20px;height:20px;display:flex;align-items:center;justify-content:center;color:#8B95A1;transition:transform .2s}
.model-card.open .arrow{transform:rotate(180deg);color:#0066B2}
.model-body{display:none;padding:0 18px 18px;border-top:1px solid #F1F5F9}
.model-card.open .model-body{display:block}
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:14px}
.color-item{padding:11px 13px;background:#F7F8FA;border:1px solid #E2E8F0;border-radius:10px;font-size:12px;line-height:1.5}
.color-ext{color:#0F172A;font-weight:600}
.color-int{color:#64748B;font-size:11px;margin-top:3px}
.empty{text-align:center;padding:60px 20px;color:#8B95A1;font-size:13px}
.cta{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E2E8F0;padding:12px 16px;box-shadow:0 -4px 20px rgba(15,23,42,.04);z-index:50}
.cta-inner{max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.cta a{display:flex;align-items:center;justify-content:center;padding:12px 8px;border-radius:10px;text-decoration:none;font-size:12px;font-weight:700;transition:all .15s}
.cta .kakao{background:#FEE500;color:#3C1E1E}
.cta .youtube{background:#FF0000;color:#fff}
.cta .form{background:#0066B2;color:#fff}
.top-btn{position:fixed;bottom:88px;right:16px;width:42px;height:42px;border-radius:50%;background:#0066B2;color:#fff;border:none;font-size:16px;cursor:pointer;box-shadow:0 4px 12px rgba(0,102,178,.3);z-index:40;display:none}
.top-btn.show{display:block}
@media(max-width:600px){header h1{font-size:19px}.color-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>BenzDream 실시간 재고</h1>
    <div class="sub">메르세데스-벤츠 판매 가능 재고</div>
    <div class="updated" id="updatedBadge">로딩 중...</div>
  </header>
  <div class="search"><input type="text" id="searchInput" placeholder="모델명 또는 색상 검색 (예: E 300, 블랙)"></div>
  <div class="cat-nav" id="catNav"></div>
  <div id="stockContent"><div class="empty">재고 정보를 불러오는 중입니다...</div></div>
</div>
<button class="top-btn" id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<div class="cta">
  <div class="cta-inner">
    <a class="kakao" href="http://pf.kakao.com/_xgxkoXG" target="_blank">💬 카카오톡</a>
    <a class="youtube" href="https://www.youtube.com/@benzdream" target="_blank">📺 유튜브</a>
    <a class="form" href="https://forms.gle/nwkrXBwDtoZfyppT9" target="_blank">📝 상담신청</a>
  </div>
</div>
<script>
const CAT_ORDER = ['Maybach','S클래스','G클래스','E클래스','CLE','C클래스','CLA','A클래스','GLS','GLE','GLC','GLA·GLB','전동화 EQ','AMG GT·SL','기타'];
let STOCK = null;
let activeCat = '전체';

async function load(){
  try{
    const r = await fetch('latest_stock.json?v='+Date.now());
    STOCK = await r.json();
    render();
  }catch(e){
    document.getElementById('stockContent').innerHTML='<div class="empty">재고 데이터를 불러오지 못했습니다.</div>';
  }
}

function groupModels(){
  const byCat = {};
  Object.entries(STOCK.models).forEach(([name,d])=>{
    if(!byCat[d.cat]) byCat[d.cat]=[];
    byCat[d.cat].push({name,...d});
  });
  const cats = CAT_ORDER.filter(c=>byCat[c]);
  Object.keys(byCat).forEach(c=>{if(!cats.includes(c))cats.push(c)});
  return {byCat,cats};
}

function render(){
  document.getElementById('updatedBadge').textContent='최종 업데이트 '+STOCK.date;
  const {byCat,cats} = groupModels();
  const nav = document.getElementById('catNav');
  nav.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'chip'+(activeCat==='전체'?' active':'');
  allChip.textContent = '전체';
  allChip.onclick = ()=>{activeCat='전체';renderList();updateChips();window.scrollTo({top:0,behavior:'smooth'})};
  nav.appendChild(allChip);
  cats.forEach(c=>{
    const b = document.createElement('button');
    b.className='chip'+(activeCat===c?' active':'');
    b.textContent=c;
    b.dataset.cat=c;
    b.onclick=()=>{activeCat=c;renderList();updateChips();const el=document.getElementById('cat-'+c);if(el)el.scrollIntoView({behavior:'smooth',block:'start'})};
    nav.appendChild(b);
  });
  renderList();
}

function updateChips(){
  document.querySelectorAll('.chip').forEach(c=>{
    const name = c.textContent;
    c.classList.toggle('active', (activeCat==='전체'&&name==='전체')||c.dataset.cat===activeCat);
  });
}

function renderList(){
  const {byCat,cats} = groupModels();
  const q = (document.getElementById('searchInput').value||'').trim().toLowerCase();
  let html = '';
  cats.forEach(cat=>{
    if(activeCat!=='전체' && cat!==activeCat) return;
    let models = byCat[cat].slice().sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    if(q){
      models = models.filter(m=>{
        if(m.name.toLowerCase().includes(q))return true;
        return Object.keys(m.colors).some(k=>k.toLowerCase().includes(q));
      });
    }
    if(!models.length)return;
    html += `<div class="cat-section" id="cat-${cat}">
      <div class="cat-header"><div class="cat-name">${cat}</div><div class="cat-cnt">${models.length}개 모델</div></div>`;
    models.forEach(m=>{
      const colors = Object.entries(m.colors).sort((a,b)=>b[1]-a[1]);
      const body = colors.map(([k,v])=>{
        const [ext,int] = k.split('|');
        return `<div class="color-item"><div class="color-ext">${ext||'-'}</div><div class="color-int">${int||'-'}</div></div>`;
      }).join('');
      html += `<div class="model-card" onclick="this.classList.toggle('open')">
        <div class="model-head"><div class="model-name">${m.name}</div><div class="arrow">▼</div></div>
        <div class="model-body"><div class="color-grid">${body}</div></div>
      </div>`;
    });
    html += `</div>`;
  });
  if(!html) html = '<div class="empty">검색 결과가 없습니다.</div>';
  document.getElementById('stockContent').innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input',()=>{if(STOCK)renderList()});
window.addEventListener('scroll',()=>{document.getElementById('topBtn').classList.toggle('show',window.scrollY>400)});
load();
</script>
</body>
</html>
